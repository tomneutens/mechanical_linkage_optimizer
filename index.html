<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linkage Generator</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Linkage Generator</h1>
        <p class="subtitle">Draw a target curve, then optimize a mechanical linkage to follow it</p>
      </header>

      <div class="toolbar">
        <div class="toolbar-group">
          <label>Mode:</label>
          <button id="btn-draw" class="active" title="Draw curve points">Draw Curve</button>
          <button id="btn-edit" title="Edit control points">Edit Points</button>
          <button id="btn-zones" title="Draw exclusion zones">Exclusion Zones</button>
          <button id="btn-clear" title="Clear the curve">Clear</button>
          <button id="btn-clear-zones" title="Clear all exclusion zones">Clear Zones</button>
        </div>
        <div class="toolbar-group">
          <label>Optimizer:</label>
          <select id="complexity-select">
            <option value="4">4-bar (simple)</option>
            <option value="6">6-bar (medium)</option>
            <option value="8">8-bar (complex)</option>
          </select>
          <label>Inputs:</label>
          <select id="input-count-select">
            <option value="1">1 crank</option>
            <option value="2">2 cranks</option>
          </select>
          <label>Iterations:</label>
          <input type="number" id="iterations-input" value="5000" min="500" max="100000" step="500" />
          <button id="btn-optimize">Optimize</button>
          <button id="btn-auto" title="Auto: try simple first, go complex if needed">Auto Optimize</button>
        </div>
        <div class="toolbar-group">
          <label>Animation:</label>
          <button id="btn-play">Play</button>
          <button id="btn-pause" disabled>Pause</button>
          <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1" />
          <span id="speed-label">1.0x</span>
        </div>
        <div class="toolbar-group">
          <label>Export:</label>
          <button id="btn-export-svg">SVG</button>
          <button id="btn-export-dxf">DXF</button>
        </div>
      </div>

      <div class="main-container">
        <svg id="canvas" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
              <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
            </pattern>
          </defs>
          <rect width="800" height="600" fill="#fafafa" />
          <rect width="800" height="600" fill="url(#grid)" />
          <g id="layer-zones"></g>
          <g id="layer-target"></g>
          <g id="layer-linkage"></g>
          <g id="layer-output-trace"></g>
          <g id="layer-handles"></g>
        </svg>
        <div class="info-panel">
          <div id="status-panel">
            <h3>Status</h3>
            <p id="status-text">Draw a target curve on the canvas to begin.</p>
          </div>
          <div id="optimizer-panel" style="display:none">
            <h3>Optimizer Progress</h3>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <p id="optimizer-status"></p>
            <p>Error: <span id="error-value">-</span></p>
          </div>
          <div id="linkage-info" style="display:none">
            <h3>Linkage Info</h3>
            <p>Type: <span id="linkage-type">-</span></p>
            <p>Links: <span id="linkage-links">-</span></p>
            <p>Fit Error: <span id="linkage-error">-</span></p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
